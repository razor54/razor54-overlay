name: pkgcheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    needs: manifests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pkgcheck
        uses: pkgcore/pkgcheck-action@v1
        with:
          args: --net

  manifests:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
    steps:
      - name: Install tooling
        run: |
          emerge --sync
          emerge --quiet dev-vcs/git app-portage/pkgdev

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Refresh manifests for changed package dirs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="HEAD^"
          fi

          mapfile -t pkgdirs < <(
            git diff --name-only "$base_ref" HEAD \
              | awk -F/ 'NF >= 2 && $1 !~ /^\./ { print $1 "/" $2 }' \
              | sort -u
          )

          if [ ${#pkgdirs[@]} -eq 0 ]; then
            echo "No package directories changed."
            exit 0
          fi

          for dir in "${pkgdirs[@]}"; do
            if ls "$dir"/*.ebuild >/dev/null 2>&1; then
              echo "Running pkgdev manifest in $dir"
              (cd "$dir" && pkgdev manifest)
            fi
          done

      - name: Upload manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifests-tree
          path: .
          retention-days: 1
